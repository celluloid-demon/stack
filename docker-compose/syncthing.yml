services:
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    environment:
      - PUID=${PUID}
      - PGID=${GUID}
      - TZ=${TZ}
    hostname: syncthing #optional
    volumes:
      - ${SYNCTHING_VOLUME_CONFIG}:/config
      - ${DATA1_HOST}:${DATA1_CONTAINER} # avoid having to define shares both in syncthing web gui AND here
      # - ${DATA1_HOST}:${DATA1_CONTAINER}
      # - ${DATA1_HOST}:${DATA1_CONTAINER}
    ports:
      - 8384:8384
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp
    restart: unless-stopped
