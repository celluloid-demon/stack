services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - SERVER_COUNTRIES=Netherlands
      - TZ=${TZ}
    env_file:
      - ${HOME}/.config/gluetun/password.env
    ports:
      - 6881:6881
      - 6881:6881/udp
      - 8191:8191 # flaresolverr
      - 8686:8686 # lidarr
      - 8090:8090 # mylar3
      - 9696:9696 # prowlarr
      - 8080:8080 # qbittorrent
      - 7878:7878 # radarr
      - 8787:8787 # readarr
      - 8989:8989 # sonarr
    restart: unless-stopped
