services:
  resilio-sync:
    image: lscr.io/linuxserver/resilio-sync:latest
    container_name: resilio-sync
    environment:
      - PUID=${PUID}
      - PGID=${GUID}
      - TZ=${TZ}
    volumes:
      - ${RESILIO_VOLUME_CONFIG}:/config
      - ${RESILIO_VOLUME_DATA}:/sync
      - ${RESILIO_VOLUME_CACHE}:/downloads
    ports:
      - 8888:8888
      - 55555:55555
    restart: unless-stopped
