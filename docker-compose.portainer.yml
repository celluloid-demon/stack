services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: ${PORTAINER_CONTAINER_NAME}
    ports:
      - ${PORTAINER_PORT_HTTP}:9000
      - ${PORTAINER_PORT_TCP_TUNNEL}:8000
      - ${PORTAINER_PORT_WEB_UI}:9443
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    
volumes:
  portainer_data:
