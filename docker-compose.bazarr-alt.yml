services:
  bazarr-alt:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr-alt
    depends_on:
      - gluetun-alt
    environment:
      - PUID=${PUID}
      - PGID=${GUID}
      - TZ=${TZ}
    # ports:
    #   - 6767:6767
    network_mode: "service:gluetun-alt"
    volumes:
      - ${BAZARR_ALT_VOLUME_CONFIG}:/config
      - ${BAZARR_ALT_VOLUME_DATA}:/data # avoid common pitfalls: https://readarr.com/#downloads-v1-docker
